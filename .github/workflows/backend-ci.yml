name: Backend CI

on:
  pull_request:
    branches: [ "dev" ]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

env:
  WORKING_DIRECTORY: backend

jobs:
  backend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: ${{ env.WORKING_DIRECTORY }}

      - name: Build and Test with Gradle
        run: ./gradlew build
        working-directory: ${{ env.WORKING_DIRECTORY }}

      - name: Notify on Success (Discord)
        if: success()
        run: |
          curl -X POST "${{ secrets.DISCORD_WEBHOOK_URL_CI }}" \
            -H "Content-Type: application/json" \
            -d '{
              "content": "[알림] 백엔드 CI 성공!",
              "embeds": [{
                "title": "Backend CI Success!",
                "description": "> [[PR #${{ github.event.number }}](${{ github.event.pull_request.html_url }})] ${{ github.event.pull_request.title }} (`${{ github.base_ref }}` ← `${{ github.head_ref }}`)",
                "color": 65280
              }]
            }'

      - name: Notify on Failure (Discord)
        if: failure()
        run: |
          curl -X POST "${{ secrets.DISCORD_WEBHOOK_URL_CI }}" \
            -H "Content-Type: application/json" \
            -d '{
              "content": "[알림] 백엔드 CI 실패 - @everyone",
              "embeds": [{
                "title": "Backend CI Failed",
                "description": "> [[PR #${{ github.event.number }}](${{ github.event.pull_request.html_url }})] ${{ github.event.pull_request.title }} (`${{ github.base_ref }}` ← `${{ github.head_ref }}`)",
                "color": 16711680,
                "fields": [
                  {"name": "🔗 Detail", "value": "[Action #${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": false}
                ]
              }]
            }'
