name: CI/CD Deploy Main

on:
  pull_request:
    branches: ["main"]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/deploy-main.yml"

  push:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: optimesai/mallo-backend

jobs:
  backend:
    name: Backend Test & Docker Build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "gradle"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build and Test with Gradle
        run: ./gradlew build

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Notify on Success (Discord)
        if: success()
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUM: ${{ github.event.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            DESCRIPTION="> [[PR #${PR_NUM}](${PR_URL})] ${PR_TITLE} (\`${BASE_REF}\` ← \`${HEAD_REF}\`)"
          else
            DESCRIPTION="> [\`${BASE_REF}\`] Deploy by ${ACTOR} (${SHA})"
          fi
          curl -X POST "${{ secrets.DISCORD_WEBHOOK_URL_CD }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg desc "$DESCRIPTION" '{
              "content": "[알림] 백엔드 빌드/배포 성공!",
              "embeds": [{
                "title": "Backend Build & Deploy Success!",
                "description": $desc,
                "color": 65280
              }]
            }')"

      - name: Notify on Failure (Discord)
        if: failure()
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUM: ${{ github.event.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            DESCRIPTION="> [[PR #${PR_NUM}](${PR_URL})] ${PR_TITLE} (\`${BASE_REF}\` ← \`${HEAD_REF}\`)"
          else
            DESCRIPTION="> [\`${BASE_REF}\`] Deploy by ${ACTOR} (${SHA})"
          fi
          curl -X POST "${{ secrets.DISCORD_WEBHOOK_URL_CI }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg desc "$DESCRIPTION" '{
              "content": "[알림] 백엔드 빌드/배포 실패 - @everyone",
              "embeds": [{
                "title": "Backend Build & Deploy Failed",
                "description": $desc,
                "color": 16711680,
                "fields": [
                  {"name": "🔗 Detail", "value": "[Action #${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": false}
                ]
              }]
            }')"

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Notify on Success (Discord)
        if: success()
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUM: ${{ github.event.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            DESCRIPTION="> [[PR #${PR_NUM}](${PR_URL})] ${PR_TITLE} (\`${BASE_REF}\` ← \`${HEAD_REF}\`)"
          else
            DESCRIPTION="> [\`${BASE_REF}\`] Deploy by ${ACTOR} (${SHA})"
          fi
          curl -X POST "${{ secrets.DISCORD_WEBHOOK_URL_CI }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg desc "$DESCRIPTION" '{
              "content": "[알림] 프론트엔드 빌드 성공!",
              "embeds": [{
                "title": "Frontend Build Success!",
                "description": $desc,
                "color": 65280
              }]
            }')"

      - name: Notify on Failure (Discord)
        if: failure()
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUM: ${{ github.event.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            DESCRIPTION="> [[PR #${PR_NUM}](${PR_URL})] ${PR_TITLE} (\`${BASE_REF}\` ← \`${HEAD_REF}\`)"
          else
            DESCRIPTION="> [\`${BASE_REF}\`] Deploy by ${ACTOR} (${SHA})"
          fi
          curl -X POST "${{ secrets.DISCORD_WEBHOOK_URL_CI }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg desc "$DESCRIPTION" '{
              "content": "[알림] 프론트엔드 빌드 실패 - @everyone",
              "embeds": [{
                "title": "Frontend Build Failed",
                "description": $desc,
                "color": 16711680,
                "fields": [
                  {"name": "🔗 Detail", "value": "[Action #${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": false}
                ]
              }]
            }')"

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd ~/mallo
            git fetch origin main
            git reset --hard origin/main

            cd ~/mallo/frontend
            npm ci
            npm run build
            sudo rm -rf /var/www/html/*
            sudo cp -r dist/* /var/www/html/

            cd ~/mallo/backend
            docker-compose pull app
            docker-compose up -d --no-recreate mysql
            
            i=0
            until [ "$(docker inspect --format='{{.State.Health.Status}}' backend-mysql 2>/dev/null)" = "healthy" ]; do
              i=$((i+1))
              if [ "$i" -ge 30 ]; then
                docker-compose logs --tail=100 mysql
                exit 1
              fi
              echo "Waiting for mysql..."
              sleep 3
            done
            
            docker-compose stop app || true
            docker-compose rm -f app || true
            docker-compose up -d --no-deps app
            docker system prune -f
