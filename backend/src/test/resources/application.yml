spring:
  datasource:
    url: jdbc:h2:mem:ssafy_pjt;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  sql:
    init:
      mode: always

jwt:
  secret: testsecretkeyfordemoapplocaltesting1234567890
  access-token-expiration-ms: 1800000
  refresh-token-expiration-ms: 604800000
  refresh-token-cookie-secure: false

langchain4j:
  open-ai:
    chat-model:
      base-url: https://gms.ssafy.io/gmsapi/api.openai.com/v1
      api-key: test-gms-key
      model-name: gpt-4o-mini
      temperature: 0
