spring:
  datasource:
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    url: jdbc:tc:mysql:8.0:///mallo_test
    username: test
    password: test

  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always
      data-locations: classpath:data.sql

jwt:
  secret: testsecretkeyfordemoapplocaltesting1234567890
  access-token-expiration-ms: 1800000
  refresh-token-expiration-ms: 604800000
  refresh-token-cookie-secure: false

langchain4j:
  open-ai:
    chat-model:
      base-url: https://gms.ssafy.io/gmsapi/api.openai.com/v1
      api-key: test-gms-key
      model-name: gpt-4o-mini
      temperature: 0