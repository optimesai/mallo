services:
  mysql:
    image: mysql:8.0
    container_name: backend-mysql
    restart: always
    env_file:
      - .env
      - .secret.env
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3316:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: backend-app
    container_name: backend-app
    restart: no
    env_file:
      - .env
      - .secret.env
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs

volumes:
  mysql_data:
